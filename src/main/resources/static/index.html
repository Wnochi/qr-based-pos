<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Crochet POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="logo-wrap">
    <img src="Logo.jpg" alt="Minilikha logo" class="site-logo">
  </div>
  <main class="main-card">
    <section class="form-side">
      <h1>Welcome Back</h1>
      
      <form id="loginForm">
        <div class="input-field">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>

        <div class="input-field">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Password">
        </div>

        <!-- Missing error message target container -->
        <div id="loginError" style="color: red; margin-bottom: 15px; font-size: 0.9rem;"></div>

        <!-- The missing login button -->
        <button type="submit" class="btn-login">Login</button>
      </form> <!-- Fixed missing closing form tag -->

    </section>

    <aside class="image-side">
      <div class="image-container">
        <img src="https://www.thesprucecrafts.com/thmb/3loI7nKT4t7-9JDqDME2Kur4tkw=/2507x3760/filters:fill(auto,1)/beautiful-beaded-crochet-project-622205580-5b01d9a0ae9ab80036a2faf7.jpg" alt="Decorative">
      </div>
    </aside>
  </main>

  <script src="auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      
      // Run the verification function from auth.js
      const res = loginUser(email, password);
      
      if(res.success){
        // Check the role returned by auth.js and redirect accordingly
        if (res.role === 'admin') {
          window.location.href = 'admin.html';
        } else if (res.role === 'cashier') {
          window.location.href = 'cashier.html';
        } else {
          // Fallback just in case
          window.location.href = 'index.html';
        }
      } else {
        // Show the error message on screen
        errEl.textContent = res.message;
      }
    });
  </script>
</body>
</html>
