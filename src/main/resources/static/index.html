<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Crochet POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main-card" aria-labelledby="loginTitle">
    <section class="form-side">
      <h1 id="loginTitle">Welcome</h1>
      
      <form id="loginForm">
        <div class="input-field">
          <label for="email">User</label>
          <input type="text" id="email" required placeholder="Enter User" autocomplete="username">
        </div>

        <div class="input-field">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Password" autocomplete="current-password">
        </div>
        <div id="loginError" aria-live="polite"></div>
        <button type="submit" class="btn-login">Login</button>
      </form>

    </section>

    <aside class="image-side">
      <div class="image-container">
        <img src="https://www.thesprucecrafts.com/thmb/3loI7nKT4t7-9JDqDME2Kur4tkw=/2507x3760/filters:fill(auto,1)/beautiful-beaded-crochet-project-622205580-5b01d9a0ae9ab80036a2faf7.jpg" alt="Crochet craft display">
      </div>
    </aside>
  </main>

  <script src="auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      
      const res = loginUser(email, password);
      
      if(res.success){
        if (res.role === 'admin') {
          window.location.href = 'admin.html';
        } else if (res.role === 'cashier') {
          window.location.href = 'cashier.html';
        } else {
          window.location.href = 'index.html';
        }
      } else {
        errEl.textContent = res.message;
      }
    });
  </script>
</body>
</html>
