## Database configuration
# Prefer a full JDBC URL via `SPRING_DATASOURCE_URL` (set this on Render using Aiven's provided URL).
# If not provided, build the URL from individual env vars with sensible local fallbacks.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pos}?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Force the MySQL 8 Dialect so Hibernate maps data types correctly
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Critical for Render port tracking
server.port=${PORT:8080}

# Notes:
# - For Aiven MySQL, set `SPRING_DATASOURCE_URL` to the connection string Aiven provides (it includes SSL).
# - If using the individual `DB_*` vars, ensure SSL options are included in the URL when targeting Aiven.