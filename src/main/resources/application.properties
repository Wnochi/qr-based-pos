# Primary database connection tracking (Defaulting to your Aiven MariaDB Instance)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://mysql-1667336c-qr-pos-system.i.aivencloud.com:28356/defaultdb?useSSL=true&trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:your_aiven_username}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_aiven_password}

# Explicit Driver for MariaDB
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Structural Syncing Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Explicit Data Mapping Dialect for MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Web Server Port binding for Render
server.port=${PORT:8080}