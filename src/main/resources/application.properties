# Tell Spring Boot to use the variables we set in Render.
# If those environment variables are missing (or you want a quick test deploy),
# fall back to an in-memory H2 database so the app can start without an external
# MySQL instance.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:posdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Explicitly set a fallback dialect to avoid dialect-detection failures
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# Important: this helps Render find your app
server.port=${PORT:8080}
