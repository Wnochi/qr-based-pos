spring.application.name=pos-system

# Use H2 in-memory database for local development to avoid missing datasource
spring.datasource.url=jdbc:h2:mem:posdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Enable H2 console (access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Let Hibernate create/update tables automatically for local dev
spring.jpa.hibernate.ddl-auto=update

# Show SQL for debugging
spring.jpa.show-sql=true
